name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A concise description of the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Start the app with ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, or screenshots if available.
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API
        - RAG
        - AIOps workflow
        - MCP integration
        - Frontend
        - Docs
        - CI / repo tooling
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python version:
        How you started the app:
        Relevant env settings:
