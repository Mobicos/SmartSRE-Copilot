name: Feature request
description: Propose a feature, enhancement, or workflow improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the user problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or operator pain point does this address?
      placeholder: Describe the problem or opportunity
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the change you want to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Describe any alternatives you considered

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact area
      options:
        - User experience
        - RAG quality
        - AIOps accuracy
        - MCP integration
        - Performance
        - Developer experience
        - Repository / process
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Mockups, examples, links, or notes
