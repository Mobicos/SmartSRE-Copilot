name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile source files
        run: python -m compileall app mcp_servers

      - name: Lint with Ruff
        run: python -m ruff check app mcp_servers

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q
          else
            echo "No tests directory found; skipping pytest."
          fi
